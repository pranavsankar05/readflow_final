<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ReadFlow — Sign Up</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Syne:wght@400;500;600;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#fafafa;font-family:'Syne',sans-serif;-webkit-font-smoothing:antialiased;color:#0a0a0a;}
.auth-layout{display:grid;grid-template-columns:1fr 1fr;min-height:100vh;}
.left-panel{background:#0a0a0a;display:flex;flex-direction:column;justify-content:space-between;padding:48px;position:relative;overflow:hidden;}
.panel-logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:500;color:#fafafa;letter-spacing:-0.3px;}
.panel-logo em{font-style:italic;color:#e85d26;}
.illustration{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 0;}
.panel-quote{border-left:2px solid #e85d26;padding-left:16px;}
.panel-quote p{font-family:'Playfair Display',serif;font-size:15px;font-style:italic;color:#aaa;line-height:1.6;}
.panel-quote cite{display:block;font-family:'DM Mono',monospace;font-size:10px;color:#555;letter-spacing:0.08em;text-transform:uppercase;margin-top:8px;}
.right-panel{display:flex;flex-direction:column;justify-content:center;align-items:center;padding:60px 48px;position:relative;}
.form-box{width:100%;max-width:400px;}
.form-eyebrow{font-family:'DM Mono',monospace;font-size:10px;color:#bbb;letter-spacing:0.14em;text-transform:uppercase;margin-bottom:10px;}
.form-title{font-family:'Playfair Display',serif;font-size:34px;font-weight:400;letter-spacing:-0.8px;line-height:1.1;margin-bottom:6px;}
.form-title em{font-style:italic;}
.form-sub{font-family:'DM Mono',monospace;font-size:12px;color:#aaa;margin-bottom:36px;}
.form-sub a{color:#0a0a0a;text-decoration:underline;text-underline-offset:2px;cursor:pointer;}
.field{margin-bottom:18px;}
.field label{display:block;font-family:'DM Mono',monospace;font-size:10px;color:#888;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:7px;}
.field input{width:100%;padding:13px 14px;border:1px solid #e8e8e5;border-radius:3px;font-family:'Syne',sans-serif;font-size:14px;color:#0a0a0a;background:#fafafa;outline:none;transition:border-color 0.15s,box-shadow 0.15s;}
.field input:focus{border-color:#0a0a0a;box-shadow:0 0 0 3px rgba(10,10,10,0.06);}
.field input::placeholder{color:#ccc;}
.submit-btn{width:100%;padding:14px;background:#0a0a0a;color:#fafafa;border:none;border-radius:3px;font-family:'Syne',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;margin-top:6px;transition:opacity 0.18s;}
.submit-btn:hover{opacity:0.82;}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed;}
.name-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.error-msg{font-family:'DM Mono',monospace;font-size:11px;color:#c0392b;margin-top:12px;display:none;padding:10px 12px;background:#fdf0ee;border-radius:2px;}
.success-msg{font-family:'DM Mono',monospace;font-size:11px;color:#1e8449;margin-top:12px;display:none;padding:10px 12px;background:#edfaf1;border-radius:2px;}
.corner-accent{position:absolute;bottom:0;right:0;width:120px;height:120px;opacity:0.04;}
@media(max-width:768px){.auth-layout{grid-template-columns:1fr;}.left-panel{display:none;}}
</style>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#0a0a0a"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <meta name="apple-mobile-web-app-title" content="ReadFlow"/>
  <script>if("serviceWorker"in navigator){navigator.serviceWorker.register("/sw.js");}</script>
</head>
<body>
<div class="auth-layout">
  <div class="left-panel">
    <div class="panel-logo">read<em>flow</em></div>
    <div class="illustration">
      <svg width="340" height="380" viewBox="0 0 340 380" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M60 260 Q170 240 280 260 L280 300 Q170 280 60 300 Z" fill="#1a1a1a" opacity="0.9"/>
        <path d="M60 140 Q115 130 170 135 L170 262 Q115 257 60 267 Z" fill="#2a2a2a"/>

        <line x1="82" y1="182" x2="158" y2="177" stroke="#444" stroke-width="1" opacity="0.6"/>

        <line x1="82" y1="230" x2="158" y2="225" stroke="#444" stroke-width="1" opacity="0.6"/>
        <line x1="182" y1="165" x2="258" y2="170" stroke="#444" stroke-width="1" opacity="0.6"/>
        <line x1="182" y1="177" x2="258" y2="182" stroke="#444" stroke-width="1" opacity="0.6"/>
        <line x1="182" y1="189" x2="258" y2="194" stroke="#444" stroke-width="1" opacity="0.6"/>
        <line x1="182" y1="201" x2="230" y2="205" stroke="#444" stroke-width="1" opacity="0.4"/>
        <line x1="182" y1="213" x2="258" y2="218" stroke="#444" stroke-width="1" opacity="0.6"/>
        <line x1="182" y1="225" x2="258" y2="230" stroke="#444" stroke-width="1" opacity="0.6"/>
        <path d="M238 130 L238 172 L228 164 L218 172 L218 130 Z" fill="#e85d26" opacity="0.9"/>

        <rect x="26" y="175" width="28" height="40" rx="2" fill="#e85d26" opacity="0.2"/>
        <rect x="22" y="170" width="28" height="40" rx="2" fill="#e85d26" opacity="0.3"/>
        <g opacity="0.2">
          <rect x="280" y="150" width="7" height="7" rx="1" fill="#fafafa"/>
          <rect x="292" y="150" width="7" height="7" rx="1" fill="#fafafa"/>
          <rect x="304" y="150" width="7" height="7" rx="1" fill="#fafafa"/>
          <rect x="280" y="163" width="7" height="7" rx="1" fill="#fafafa"/>
          <rect x="292" y="163" width="7" height="7" rx="1" fill="#fafafa" opacity="0.6"/>
          <rect x="304" y="163" width="7" height="7" rx="1" fill="#fafafa"/>
          <rect x="280" y="176" width="7" height="7" rx="1" fill="#fafafa" opacity="0.5"/>
          <rect x="292" y="176" width="7" height="7" rx="1" fill="#fafafa"/>
          <rect x="304" y="176" width="7" height="7" rx="1" fill="#fafafa" opacity="0.4"/>
        </g>
        <circle cx="170" cy="170" r="145" stroke="#ffffff" stroke-width="0.5" opacity="0.05"/>
        <circle cx="170" cy="170" r="160" stroke="#e85d26" stroke-width="0.5" opacity="0.08"/>
        <g transform="translate(290,80) rotate(-35)">
          <rect x="-4" y="-32" width="8" height="52" rx="2" fill="#fafafa" opacity="0.15"/>
          <polygon points="-4,20 4,20 0,32" fill="#e85d26" opacity="0.6"/>
          <rect x="-4" y="-32" width="8" height="8" rx="1" fill="#555"/>
        </g>
        <line x1="60" y1="320" x2="140" y2="320" stroke="#e85d26" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
        <line x1="148" y1="320" x2="160" y2="320" stroke="#e85d26" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
        <g transform="translate(308,240)" opacity="0.25">
          <line x1="0" y1="-8" x2="0" y2="8" stroke="#fafafa" stroke-width="1"/>
          <line x1="-8" y1="0" x2="8" y2="0" stroke="#fafafa" stroke-width="1"/>
        </g>
      </svg>
    </div>
    <div class="panel-quote">
      <p>"A reader lives a thousand lives before he dies. The man who never reads lives only one."</p>
      <cite>— George R.R. Martin</cite>
    </div>
  </div>

  <!-- SIGN UP -->
  <div class="right-panel" id="signup-panel">
    <div class="form-box">
      <div class="form-eyebrow">Begin your journey</div>
      <div class="form-title">Create your <em>account.</em></div>
      <div class="form-sub">Already have one? <a onclick="showLogin()">Sign in</a></div>
      <div class="name-row">
        <div class="field"><label>First name</label><input type="text" id="su-fname" placeholder="Pranav"/></div>
        <div class="field"><label>Last name</label><input type="text" id="su-lname" placeholder=""/></div>
      </div>
      <div class="field"><label>Email</label><input type="email" id="su-email" placeholder="you@example.com"/></div>
      <div class="field"><label>Password</label><input type="password" id="su-pass" placeholder="Min. 6 characters"/></div>
      <div class="field"><label>Confirm password</label><input type="password" id="su-pass2" placeholder="Repeat password"/></div>
      <button class="submit-btn" id="su-btn" onclick="doSignup()">Create Account</button>
      <div class="error-msg" id="su-error"></div>
      <div class="success-msg" id="su-success"></div>
    </div>
    <svg class="corner-accent" viewBox="0 0 120 120"><circle cx="120" cy="120" r="100" fill="#0a0a0a"/></svg>
  </div>

  <!-- LOGIN -->
  <div class="right-panel" id="login-panel" style="display:none;">
    <div class="form-box">
      <div class="form-eyebrow">Welcome back</div>
      <div class="form-title">Sign <em>in.</em></div>
      <div class="form-sub">New here? <a onclick="showSignup()">Create an account</a></div>
      <div class="field"><label>Email</label><input type="email" id="li-email" placeholder="you@example.com"/></div>
      <div class="field"><label>Password</label><input type="password" id="li-pass" placeholder="Your password"/></div>
      <button class="submit-btn" id="li-btn" onclick="doLogin()">Sign In</button>
      <div class="error-msg" id="li-error"></div>
    </div>
    <svg class="corner-accent" viewBox="0 0 120 120"><circle cx="120" cy="120" r="100" fill="#0a0a0a"/></svg>
  </div>
</div>

<script>
const SUPABASE_URL='https://sxozpfmrwkahwyfchqcf.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN4b3pwZm1yd2thaHd5ZmNocWNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NDI3MjYsImV4cCI6MjA5NjIxODcyNn0.hAnCe1kGS-CdmhaTybab8utIJU5v4XxAZEC0qQpVTfc';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

// Check if already logged in
(async()=>{
  const {data:{session}}=await sb.auth.getSession();
  if(session) window.location.href='readflow-home.html';
})();

function showLogin(){document.getElementById('signup-panel').style.display='none';document.getElementById('login-panel').style.display='flex';}
function showSignup(){document.getElementById('login-panel').style.display='none';document.getElementById('signup-panel').style.display='flex';}
function showErr(id,msg){const el=document.getElementById(id);el.textContent=msg;el.style.display='block';}
function hideErr(id){document.getElementById(id).style.display='none';}

async function doSignup(){
  hideErr('su-error');hideErr('su-success');
  const fname=document.getElementById('su-fname').value.trim();
  const email=document.getElementById('su-email').value.trim();
  const pass=document.getElementById('su-pass').value;
  const pass2=document.getElementById('su-pass2').value;
  if(!fname){showErr('su-error','Please enter your first name.');return;}
  if(!email||!email.includes('@')){showErr('su-error','Please enter a valid email.');return;}
  if(pass.length<6){showErr('su-error','Password must be at least 6 characters.');return;}
  if(pass!==pass2){showErr('su-error','Passwords do not match.');return;}

  const btn=document.getElementById('su-btn');
  btn.disabled=true;btn.textContent='Creating…';

  // Step 1: sign up with Supabase auth
  const {data,error}=await sb.auth.signUp({email,password:pass});

  if(error){
    showErr('su-error',error.message);
    btn.disabled=false;btn.textContent='Create Account';
    return;
  }

  // Step 2: manually insert profile (no trigger needed)
  if(data.user){
    await sb.from('profiles').upsert({
      id:data.user.id,
      fname:fname,
      email:email
    });
  }

  const s=document.getElementById('su-success');
  s.textContent='Account created! Redirecting…';
  s.style.display='block';
  setTimeout(()=>window.location.href='readflow-home.html',1000);
}

async function doLogin(){
  hideErr('li-error');
  const email=document.getElementById('li-email').value.trim();
  const pass=document.getElementById('li-pass').value;
  if(!email){showErr('li-error','Please enter your email.');return;}
  if(!pass){showErr('li-error','Please enter your password.');return;}

  const btn=document.getElementById('li-btn');
  btn.disabled=true;btn.textContent='Signing in…';

  const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){
    showErr('li-error','Incorrect email or password.');
    btn.disabled=false;btn.textContent='Sign In';
    return;
  }
  window.location.href='readflow-home.html';
}

document.addEventListener('keydown',function(e){
  if(e.key!=='Enter')return;
  if(document.getElementById('signup-panel').style.display!=='none')doSignup();
  else doLogin();
});
</script>
</body>
</html>
