<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ReadFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Syne:wght@400;500;600;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#fafafa;color:#0a0a0a;font-family:'Syne',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;}
nav{height:56px;border-bottom:1px solid #e8e8e5;display:flex;align-items:center;justify-content:space-between;padding:0 44px;position:sticky;top:0;background:#fafafa;z-index:50;}
.logo{font-family:'Playfair Display',serif;font-size:19px;font-weight:500;letter-spacing:-0.3px;text-decoration:none;color:#0a0a0a;}
.logo em{font-style:italic;color:#e85d26;}
.nav-right{display:flex;align-items:center;gap:10px;}
.icon-btn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border:1px solid #e8e8e5;border-radius:2px;background:none;cursor:pointer;color:#888;font-size:15px;transition:all 0.15s;}
.icon-btn:hover{border-color:#0a0a0a;color:#0a0a0a;}
.btn-add{padding:9px 18px;background:#0a0a0a;color:#fafafa;border:none;border-radius:2px;font-family:'Syne',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:opacity 0.18s;}
.btn-add:hover{opacity:0.8;}
.page{max-width:1080px;margin:0 auto;padding:0 44px 80px;}
.hero{padding:52px 0 36px;border-bottom:1px solid #e8e8e5;display:flex;align-items:flex-end;justify-content:space-between;gap:24px;}
.hero-eyebrow{font-family:'DM Mono',monospace;font-size:10px;color:#bbb;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:10px;}
.hero-title{font-family:'Playfair Display',serif;font-size:clamp(34px,5vw,52px);font-weight:400;line-height:1.05;letter-spacing:-1.5px;}
.hero-title em{font-style:italic;}
.hero-sub{margin-top:10px;font-family:'DM Mono',monospace;font-size:12px;color:#aaa;}
.accent-line{display:flex;gap:6px;padding:14px 0 0;}
.accent-line span{height:3px;border-radius:99px;}
.books-grid{margin-top:36px;display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:1px;background:#e8e8e5;border:1px solid #e8e8e5;border-radius:4px;overflow:hidden;}
.empty-state{grid-column:1/-1;padding:100px 40px;text-align:center;background:#fafafa;}
.empty-title{font-family:'Playfair Display',serif;font-size:22px;font-style:italic;color:#ccc;margin-bottom:8px;}
.empty-sub{font-family:'DM Mono',monospace;font-size:11px;color:#ddd;}
.card{background:#fafafa;padding:26px 24px 22px;display:flex;flex-direction:column;cursor:pointer;transition:background 0.18s;opacity:0;transform:translateY(10px);animation:rise 0.35s ease forwards;}
.card:hover{background:#f4f4f1;}
@keyframes rise{to{opacity:1;transform:translateY(0);}}
.cover-wrap{width:100%;aspect-ratio:16/9;background:#f0f0ed;border-radius:3px;display:flex;align-items:center;justify-content:center;margin-bottom:18px;}
.cover-book{width:62px;height:86px;border-radius:2px 4px 4px 2px;position:relative;box-shadow:3px 3px 10px rgba(0,0,0,0.14);display:flex;flex-direction:column;padding:10px 9px;gap:5px;overflow:hidden;}
.cover-book::before{content:'';position:absolute;left:0;top:0;bottom:0;width:5px;background:rgba(0,0,0,0.18);}
.cl{height:2px;border-radius:1px;background:rgba(255,255,255,0.4);}
.cl.w6{width:60%;}.cl.w8{width:80%;}.cl.w4{width:40%;}
.card-genre{font-family:'DM Mono',monospace;font-size:10px;color:#bbb;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:5px;}
.card-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:400;line-height:1.3;color:#0a0a0a;margin-bottom:2px;}
.card-author{font-family:'DM Mono',monospace;font-size:11px;font-weight:300;color:#999;margin-bottom:16px;}
.prog-row{display:flex;justify-content:space-between;margin-bottom:6px;}
.prog-label{font-family:'DM Mono',monospace;font-size:10px;color:#bbb;}
.prog-pct{font-family:'DM Mono',monospace;font-size:11px;color:#0a0a0a;}
.prog-track{width:100%;height:3px;background:#e8e8e5;border-radius:99px;overflow:hidden;margin-bottom:16px;}
.prog-fill{height:100%;background:#0a0a0a;border-radius:99px;}
.card-btns{display:flex;gap:7px;margin-top:auto;}
.btn-read{flex:1;padding:10px;background:none;border:1px solid #0a0a0a;border-radius:2px;font-family:'Syne',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#0a0a0a;cursor:pointer;transition:background 0.15s,color 0.15s;}
.btn-read:hover{background:#0a0a0a;color:#fafafa;}
.btn-del{padding:10px 12px;background:none;border:1px solid #e8e8e5;border-radius:2px;font-size:11px;color:#ccc;cursor:pointer;transition:all 0.15s;}
.btn-del:hover{border-color:#e85d26;color:#e85d26;}
.overlay{position:fixed;inset:0;z-index:100;background:rgba(10,10,10,0.52);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.22s;}
.overlay.open{opacity:1;pointer-events:all;}
.modal{background:#fafafa;border-radius:4px;padding:34px 32px 28px;width:min(460px,92vw);transform:translateY(14px);transition:transform 0.25s ease;}
.overlay.open .modal{transform:translateY(0);}
.modal-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;}
.modal-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:400;}
.modal-title em{font-style:italic;}
.xbtn{background:none;border:none;font-size:20px;color:#bbb;cursor:pointer;line-height:1;transition:color 0.15s;}
.xbtn:hover{color:#0a0a0a;}
.field{margin-bottom:14px;}
.field label{display:block;font-family:'DM Mono',monospace;font-size:9px;color:#aaa;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:6px;}
.field input{width:100%;padding:10px 12px;border:1px solid #e8e8e5;border-radius:2px;font-family:'Syne',sans-serif;font-size:13px;color:#0a0a0a;background:#fafafa;outline:none;transition:border-color 0.15s;}
.field input:focus{border-color:#0a0a0a;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.color-row{display:flex;gap:8px;margin-top:6px;}
.cdot{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform 0.15s;}
.cdot:hover{transform:scale(1.18);}
.cdot.sel{border-color:#0a0a0a;}
.modal-acts{display:flex;gap:10px;margin-top:22px;}
.mcancelbtn{flex:1;padding:11px;background:none;border:1px solid #e8e8e5;border-radius:2px;font-family:'Syne',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#aaa;cursor:pointer;}
.mconfirmbtn{flex:2;padding:11px;background:#0a0a0a;color:#fafafa;border:none;border-radius:2px;font-family:'Syne',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:opacity 0.15s;}
.mconfirmbtn:hover{opacity:0.8;}
.mconfirmbtn:disabled{opacity:0.5;cursor:not-allowed;}
.goal-inp-row{display:flex;align-items:center;gap:6px;margin-top:8px;}
.ginp{width:52px;padding:8px 0;text-align:center;border:1px solid #e8e8e5;border-radius:2px;font-family:'DM Mono',monospace;font-size:16px;color:#0a0a0a;background:#fafafa;outline:none;transition:border-color 0.15s;}
.ginp:focus{border-color:#0a0a0a;}
.gcolon{font-family:'DM Mono',monospace;font-size:18px;color:#ccc;}
.ghint{font-family:'DM Mono',monospace;font-size:10px;color:#ccc;margin-top:6px;}
.goal-preview{font-family:'DM Mono',monospace;font-size:11px;color:#888;margin-top:8px;}
.loading{text-align:center;padding:60px;font-family:'DM Mono',monospace;font-size:12px;color:#bbb;grid-column:1/-1;background:#fafafa;}
</style>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#0a0a0a"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <meta name="apple-mobile-web-app-title" content="ReadFlow"/>
  <script>if("serviceWorker"in navigator){navigator.serviceWorker.register("/sw.js");}</script>
</head>
<body>
<nav>
  <a href="#" class="logo">read<em>flow</em></a>
  <div class="nav-right">
    <button class="icon-btn" onclick="openSettings()" title="Settings">⚙</button>
    <button onclick="doLogout()" style="padding:9px 16px;background:none;border:1px solid #e8e8e5;border-radius:2px;font-family:'Syne',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#888;cursor:pointer;transition:all 0.15s;" onmouseover="this.style.borderColor='#0a0a0a';this.style.color='#0a0a0a'" onmouseout="this.style.borderColor='#e8e8e5';this.style.color='#888'">Sign Out</button>
    <button class="btn-add" onclick="openAddBook()">+ Add Book</button>
  </div>
</nav>
<div class="page">
  <div class="hero">
    <div>
      <div class="hero-eyebrow">— your reading space</div>
      <div class="hero-title">Hello, <em id="hero-name">there.</em></div>
      <div class="hero-sub" id="hero-sub">loading your library…</div>
    </div>
  </div>
  <div class="accent-line">
    <span style="width:32px;background:#e85d26;"></span>
    <span style="width:12px;background:#2ecc71;"></span>
    <span style="width:6px;background:#e8e8e5;"></span>
  </div>
  <div class="books-grid" id="grid"><div class="loading">loading…</div></div>
</div>

<!-- ADD BOOK MODAL -->
<div class="overlay" id="add-overlay" onclick="if(event.target===this)closeAddBook()">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">Add a <em>new book</em></div>
      <button class="xbtn" onclick="closeAddBook()">&#215;</button>
    </div>
    <div class="field"><label>Book title</label><input type="text" id="f-title" placeholder="e.g. The Midnight Library"/></div>
    <div class="field"><label>Author</label><input type="text" id="f-author" placeholder="e.g. Matt Haig"/></div>
    <div class="two-col">
      <div class="field"><label>Total pages</label><input type="number" id="f-pages" placeholder="320" min="1"/></div>
      <div class="field"><label>Genre</label><input type="text" id="f-genre" placeholder="Fiction"/></div>
    </div>
    <div class="field">
      <label>Cover colour</label>
      <div class="color-row">
        <div class="cdot sel" style="background:#1a1a1a" data-c="#1a1a1a" onclick="pickColor(this)"></div>
        <div class="cdot" style="background:#c0392b" data-c="#c0392b" onclick="pickColor(this)"></div>
        <div class="cdot" style="background:#e85d26" data-c="#e85d26" onclick="pickColor(this)"></div>
        <div class="cdot" style="background:#1a5276" data-c="#1a5276" onclick="pickColor(this)"></div>
        <div class="cdot" style="background:#1e8449" data-c="#1e8449" onclick="pickColor(this)"></div>
        <div class="cdot" style="background:#7d3c98" data-c="#7d3c98" onclick="pickColor(this)"></div>
        <div class="cdot" style="background:#566573" data-c="#566573" onclick="pickColor(this)"></div>
      </div>
    </div>
    <div class="modal-acts">
      <button class="mcancelbtn" onclick="closeAddBook()">Cancel</button>
      <button class="mconfirmbtn" id="add-btn" onclick="addBook()">Add to Library</button>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="overlay" id="settings-overlay" onclick="if(event.target===this)closeSettings()">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title"><em>Settings</em></div>
      <button class="xbtn" onclick="closeSettings()">&#215;</button>
    </div>
    <div class="field">
      <label>Default daily reading goal</label>
      <div class="goal-inp-row">
        <input class="ginp" id="s-goal-h" type="number" value="1" min="0" max="23"/>
        <span class="gcolon">:</span>
        <input class="ginp" id="s-goal-m" type="number" value="0" min="0" max="59"/>
      </div>
      <div class="ghint">hours : minutes</div>
      <div class="goal-preview" id="goal-preview">Default goal: 1 hour</div>
    </div>
    <div class="modal-acts">
      <button class="mcancelbtn" onclick="closeSettings()">Cancel</button>
      <button class="mconfirmbtn" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL='https://sxozpfmrwkahwyfchqcf.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN4b3pwZm1yd2thaHd5ZmNocWNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NDI3MjYsImV4cCI6MjA5NjIxODcyNn0.hAnCe1kGS-CdmhaTybab8utIJU5v4XxAZEC0qQpVTfc';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let userId=null, userName='there', books=[], chosenColor='#1a1a1a';
const GD='readflow_goal_default';

// Session guard
(async()=>{
  const {data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='readflow-auth.html';return;}
  userId=session.user.id;
  userName=session.user.user_metadata?.fname||session.user.email.split('@')[0];
  document.getElementById('hero-name').textContent=userName+'.';
  document.title='ReadFlow — '+userName;
  loadBooks();
})();

async function loadBooks(){
  const {data,error}=await sb.from('books').select('*').order('created_at',{ascending:false});
  if(error){console.error(error);return;}
  books=data||[];
  render();
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function render(){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  const sub=books.length===0?'0 books in your library':books.length+' book'+(books.length!==1?'s':'')+' in your library';
  document.getElementById('hero-sub').textContent=sub;
  if(!books.length){
    grid.innerHTML='<div class="empty-state"><div class="empty-title">Your library is empty.</div><div class="empty-sub">add your first book to get started</div></div>';
    return;
  }
  books.forEach(function(b,i){
    const pct=Math.round((b.read/b.pages)*100);
    const lbl=pct===0?'Start Reading':pct>=100?'Read Again':'Continue Reading';
    const card=document.createElement('div');
    card.className='card';card.style.animationDelay=(i*0.06)+'s';
    card.innerHTML='<div class="cover-wrap"><div class="cover-book" style="background:'+b.color+'"><div class="cl w8"></div><div class="cl w6"></div><div class="cl w4"></div></div></div>'+
      '<div class="card-genre">'+esc(b.genre)+'</div>'+
      '<div class="card-title">'+esc(b.title)+'</div>'+
      '<div class="card-author">'+esc(b.author)+'</div>'+
      '<div class="prog-row"><span class="prog-label">Progress</span><span class="prog-pct">'+pct+'%</span></div>'+
      '<div class="prog-track"><div class="prog-fill" style="width:'+pct+'%"></div></div>'+
      '<div class="card-btns"><button class="btn-read" onclick="goBook('+b.id+')">'+lbl+'</button>'+
      '<button class="btn-del" onclick="delBook('+b.id+',event)">&#x2715;</button></div>';
    grid.appendChild(card);
  });
}

function goBook(id){window.location.href='readflow-book.html?id='+id;}

async function delBook(id,e){
  e.stopPropagation();
  if(!confirm('Remove this book?'))return;
  await sb.from('books').delete().eq('id',id);
  books=books.filter(b=>b.id!==id);
  render();
}

function openAddBook(){document.getElementById('add-overlay').classList.add('open');document.getElementById('f-title').focus();}
function closeAddBook(){
  document.getElementById('add-overlay').classList.remove('open');
  ['f-title','f-author','f-pages','f-genre'].forEach(id=>document.getElementById(id).value='');
}
function pickColor(el){document.querySelectorAll('.cdot').forEach(d=>d.classList.remove('sel'));el.classList.add('sel');chosenColor=el.getAttribute('data-c');}

async function addBook(){
  const title=document.getElementById('f-title').value.trim();
  const author=document.getElementById('f-author').value.trim();
  const pages=parseInt(document.getElementById('f-pages').value)||200;
  const genre=document.getElementById('f-genre').value.trim()||'General';
  if(!title){document.getElementById('f-title').focus();return;}
  const btn=document.getElementById('add-btn');
  btn.disabled=true;btn.textContent='Adding…';
  const {data,error}=await sb.from('books').insert([{
    user_id:userId,title,author:author||'Unknown Author',genre,pages,read:0,color:chosenColor
  }]).select().single();
  btn.disabled=false;btn.textContent='Add to Library';
  if(error){alert('Error adding book: '+error.message);return;}
  books.unshift(data);
  closeAddBook();render();
}

function openSettings(){
  const g=JSON.parse(localStorage.getItem(GD)||'{"h":1,"m":0}');
  document.getElementById('s-goal-h').value=g.h;
  document.getElementById('s-goal-m').value=g.m;
  updateGoalPreview();
  document.getElementById('settings-overlay').classList.add('open');
}
function closeSettings(){document.getElementById('settings-overlay').classList.remove('open');}
function updateGoalPreview(){
  const h=parseInt(document.getElementById('s-goal-h').value)||0,m=parseInt(document.getElementById('s-goal-m').value)||0;
  const t=h>0?(m>0?h+'h '+m+'m':h+' hour'+(h!==1?'s':'')):m+' min';
  document.getElementById('goal-preview').textContent='Default goal: '+t;
}
document.getElementById('s-goal-h').addEventListener('input',updateGoalPreview);
document.getElementById('s-goal-m').addEventListener('input',updateGoalPreview);
function saveSettings(){
  let g={h:parseInt(document.getElementById('s-goal-h').value)||0,m:parseInt(document.getElementById('s-goal-m').value)||0};
  if(!g.h&&!g.m)g={h:1,m:0};
  localStorage.setItem(GD,JSON.stringify(g));
  closeSettings();
}

async function doLogout(){
  await sb.auth.signOut();
  window.location.href='readflow-auth.html';
}

document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeAddBook();closeSettings();}});
</script>
</body>
</html>
